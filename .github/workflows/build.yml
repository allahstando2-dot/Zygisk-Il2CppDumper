name: Build
on: 
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Обновлено с v3 на v4

    - name: Set up JDK 17 # Рекомендуется использовать 17 для современных Gradle
      uses: actions/setup-java@v4 # Обновлено с v3 на v4
      with:
        distribution: 'temurin'
        java-version: '17' 
        cache: 'gradle'

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        # Вносим правки в конфиги
        sed -i 's/moduleDescription = "/moduleDescription = "(${{ github.event.inputs.package_name }}) /g' module.gradle
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        # Собираем релиз
        ./gradlew :module:assembleRelease

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Обновлено с v3 на v4 (КРИТИЧНО)
      with:
        name: zygisk-il2cppdumper-${{ github.event.inputs.package_name }}
        path: out/magisk_module_release/
